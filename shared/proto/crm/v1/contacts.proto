syntax = "proto3";

package crm.v1;

option go_package = "github.com/go-crm/services/gen/crmv1;crmv1";

// Internal gRPC contract for the contacts domain.
// Regenerate Go stubs with buf/protoc into services/gen.

message Contact {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string account_id = 6;
}

message GetContactRequest {
  string id = 1;
}

message GetContactResponse {
  Contact contact = 1;
}

service ContactsService {
  rpc GetContact(GetContactRequest) returns (GetContactResponse);
}
