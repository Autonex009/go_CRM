version: "2"
# Schema-per-domain: each domain owns its queries + generated code under internal/<domain>/db.
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/auth/db/queries.sql"
    gen:
      go:
        package: "authdb"
        out: "internal/auth/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/contacts/db/queries.sql"
    gen:
      go:
        package: "contactsdb"
        out: "internal/contacts/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
